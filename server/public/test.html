<!DOCTYPE html>
<html>
<body>
    <h1>Socket.io Test</h1>
    <div id="messages"></div>
    <!-- Load the socket.io client library directly from CDN -->
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        // Connect to the backend
        const socket = io("http://localhost:4000");

        // Hardcode a fake user ID for testing
        const myUserId = "69b79c76c5222bee1869b061"; // Paste a real MongoDB User ID here

        socket.on("connect", () => {
            console.log("Connected! My socket ID is:", socket.id);
            // Tell the server who we are so it puts us in the right room
            socket.emit("setup", { _id: myUserId });
        });

        // Listen for new messages pushed from the Express API
        socket.on("message Received", (newMessage) => {
            console.log("Got a message over socket!", newMessage);
            document.getElementById("messages").innerHTML += 
                `<p><b>From ${newMessage.sender}:</b> ${newMessage.content}</p>`;
        });
    </script>
</body>
</html>
